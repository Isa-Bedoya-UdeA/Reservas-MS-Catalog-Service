# Server
server.port=8082

# ======================
# IMPORTANT FOR LOCAL DEVELOPMENT (IntelliJ):
# 1. If running in IntelliJ, set these in your Run Configuration -> Environment variables
#    OR ensure .env file exists in project root (spring-dotenv will load it automatically)
# 2. Required variables:
#    - DB_URL=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require
#    - DB_USER=postgres.icbgfdgwvtbrissgfzie
#    - DB_PASSWORD=<your-secure-password>
#    - JWT_SECRET=<your-jwt-secret>
#    - JWT_EXPIRATION=86400000
# ======================

# Database - Supabase (modo desarrollo - Transaction Pooler para IPv4 compatibility)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.icbgfdgwvtbrissgfzie}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - desarrollo (valida el esquema sin modificar)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=true

# Feign Client URLs
services.auth.url=${SERVICES_AUTH_URL:http://localhost:8081}

# Logging para desarrollo
logging.level.org.springframework.security=DEBUG
logging.level.com.codefactory.reservasmscatalogservice=DEBUG

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator para health checks en desarrollo
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always